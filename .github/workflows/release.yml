name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"
  VERSION_PKG: github.com/young1lin/port-bridge/internal/version

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install CGO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libdbus-1-dev

      - name: Build Linux binary and archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RAW_NAME="port-bridge_linux-${{ matrix.arch }}"
          PACKAGE_NAME="port-bridge_linux_${{ matrix.arch }}"

          rm -f cmd/port-bridge/portbridge_*.syso
          mkdir -p "out/package/${PACKAGE_NAME}"

          GOOS=linux GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build \
            -ldflags "-s -w \
              -X ${{ env.VERSION_PKG }}.Version=${VERSION} \
              -X ${{ env.VERSION_PKG }}.GitCommit=${GIT_COMMIT} \
              -X ${{ env.VERSION_PKG }}.BuildDate=${BUILD_DATE}" \
            -trimpath \
            -o "out/${RAW_NAME}" \
            ./cmd/port-bridge

          cp "out/${RAW_NAME}" "out/package/${PACKAGE_NAME}/port-bridge"
          cp LICENSE* README* "out/package/${PACKAGE_NAME}/"
          tar -czf "out/${PACKAGE_NAME}.tar.gz" -C out/package "${PACKAGE_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            out/port-bridge_linux-${{ matrix.arch }}
            out/port-bridge_linux_${{ matrix.arch }}.tar.gz

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-2025
            msystem: CLANG64
            pkg_arch: x86_64
          - arch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64
            pkg_arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          path-type: inherit
          install: >-
            mingw-w64-clang-${{ matrix.pkg_arch }}-toolchain

      - name: Build Windows executable
        shell: msys2 {0}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          rm -f cmd/port-bridge/portbridge_*.syso
          mkdir -p out
          go run ./cmd/port-bridge/gen_ico/main.go

          pushd cmd/port-bridge >/dev/null
          go run github.com/tc-hib/go-winres@latest make \
            --in winres.json \
            --arch ${{ matrix.arch }} \
            --out portbridge_${{ matrix.arch }}.syso \
            --no-suffix
          popd >/dev/null

          GOOS=windows GOARCH=${{ matrix.arch }} CGO_ENABLED=1 CC=clang go build \
            -ldflags "-s -w -H=windowsgui \
              -X ${{ env.VERSION_PKG }}.Version=${VERSION} \
              -X ${{ env.VERSION_PKG }}.GitCommit=${GIT_COMMIT} \
              -X ${{ env.VERSION_PKG }}.BuildDate=${BUILD_DATE}" \
            -trimpath \
            -o "out/port-bridge_windows-${{ matrix.arch }}.exe" \
            ./cmd/port-bridge

      - name: Package Windows archive
        shell: pwsh
        run: |
          $packageName = "port-bridge_windows_${{ matrix.arch }}"
          $packageDir = "out/package/$packageName"
          New-Item -ItemType Directory -Force $packageDir | Out-Null
          Copy-Item "out/port-bridge_windows-${{ matrix.arch }}.exe" "$packageDir/port-bridge.exe"
          Copy-Item README* $packageDir
          Copy-Item LICENSE* $packageDir
          Compress-Archive -Path "$packageDir/*" -DestinationPath "out/$packageName.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            out/port-bridge_windows-${{ matrix.arch }}.exe
            out/port-bridge_windows_${{ matrix.arch }}.zip

  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build macOS binary and app bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RAW_NAME="port-bridge_darwin-${{ matrix.arch }}"
          APP_DIR="out/PortBridge.app"

          rm -f cmd/port-bridge/portbridge_*.syso
          mkdir -p out
          go run ./cmd/port-bridge/gen_ico/main.go

          GOOS=darwin GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build \
            -ldflags "-s -w \
              -X ${{ env.VERSION_PKG }}.Version=${VERSION} \
              -X ${{ env.VERSION_PKG }}.GitCommit=${GIT_COMMIT} \
              -X ${{ env.VERSION_PKG }}.BuildDate=${BUILD_DATE}" \
            -trimpath \
            -o "out/${RAW_NAME}" \
            ./cmd/port-bridge

          ICON_SRC="cmd/port-bridge/assets/icon_1024.png"
          mkdir -p "${APP_DIR}/Contents/MacOS" "${APP_DIR}/Contents/Resources"
          cp "out/${RAW_NAME}" "${APP_DIR}/Contents/MacOS/PortBridge"
          chmod +x "${APP_DIR}/Contents/MacOS/PortBridge"

          ICONSET="${RUNNER_TEMP}/PortBridge.iconset"
          mkdir -p "${ICONSET}"
          for size in 16 32 128 256 512; do
            sips -z ${size} ${size} "${ICON_SRC}" --out "${ICONSET}/icon_${size}x${size}.png" >/dev/null
            sips -z $((size * 2)) $((size * 2)) "${ICON_SRC}" --out "${ICONSET}/icon_${size}x${size}@2x.png" >/dev/null
          done
          cp "${ICON_SRC}" "${ICONSET}/icon_512x512@2x.png"
          iconutil -c icns "${ICONSET}" -o "${APP_DIR}/Contents/Resources/PortBridge.icns"

          cat > "${APP_DIR}/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>       <string>PortBridge</string>
            <key>CFBundleIdentifier</key>       <string>com.young1lin.port-bridge</string>
            <key>CFBundleName</key>             <string>PortBridge</string>
            <key>CFBundleDisplayName</key>      <string>PortBridge</string>
            <key>CFBundleIconFile</key>         <string>PortBridge</string>
            <key>CFBundlePackageType</key>      <string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key>          <string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key>   <string>10.15</string>
            <key>NSHighResolutionCapable</key>  <true/>
            <key>NSSupportsAutomaticGraphicsSwitching</key><true/>
            <key>LSUIElement</key>              <false/>
          </dict>
          </plist>
          PLIST

          ditto -c -k --sequesterRsrc --keepParent "${APP_DIR}" \
            "out/PortBridge_darwin_${{ matrix.arch }}.app.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: |
            out/port-bridge_darwin-${{ matrix.arch }}
            out/PortBridge_darwin_${{ matrix.arch }}.app.zip

  release:
    needs:
      - build-linux
      - build-windows
      - build-mac
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-*"
          path: release-assets
          merge-multiple: true

      - name: Prepare dist for delta patch generation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          mkdir -p dist/port-bridge-darwin-amd64
          mkdir -p dist/port-bridge-darwin-arm64

          cp release-assets/port-bridge_windows-amd64.exe dist/
          cp release-assets/port-bridge_windows-arm64.exe dist/
          cp release-assets/port-bridge_linux-amd64 dist/
          cp release-assets/port-bridge_linux-arm64 dist/
          cp release-assets/port-bridge_darwin-amd64 dist/port-bridge-darwin-amd64/port-bridge
          cp release-assets/port-bridge_darwin-arm64 dist/port-bridge-darwin-arm64/port-bridge

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          find . -maxdepth 1 -type f -printf '%P\n' | sort | xargs sha256sum > checksums.txt

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "${GITHUB_REF_NAME}" --repo young1lin/port-bridge >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo young1lin/port-bridge \
              --verify-tag \
              --generate-notes \
              --title "${GITHUB_REF_NAME}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" release-assets/* \
            --repo young1lin/port-bridge \
            --clobber

      - name: Generate delta patches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bsdiff
          bash scripts/generate_patches.sh "${GITHUB_REF_NAME}"
