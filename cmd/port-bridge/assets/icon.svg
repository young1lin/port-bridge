<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1565C0"/>

  <!-- Left port (local) — vertical bar -->
  <rect x="10" y="18" width="11" height="64" rx="3" fill="white"/>

  <!-- Right port (remote) — vertical bar -->
  <rect x="79" y="18" width="11" height="64" rx="3" fill="white"/>

  <!-- Tunnel pipe: two horizontal rails -->
  <rect x="21" y="38" width="58" height="7"  rx="2" fill="white" opacity="0.55"/>
  <rect x="21" y="55" width="58" height="7"  rx="2" fill="white" opacity="0.55"/>

  <!-- Arrow shaft (solid, sits between the rails) -->
  <rect x="21" y="43" width="38" height="14" fill="white"/>

  <!-- Arrow head -->
  <polygon points="59,28 82,50 59,72" fill="white"/>

  <!-- Lock body on the shaft — signals SSH encryption -->
  <rect x="43" y="44" width="10" height="9" rx="1.5" fill="#1565C0"/>
  <!-- Lock shackle -->
  <path d="M45 44 Q48 38 51 44" stroke="#1565C0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Lock keyhole dot -->
  <circle cx="48" cy="49" r="1.5" fill="white"/>
</svg>
