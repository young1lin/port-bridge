version: 2

project_name: port-bridge

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=1
    goos:
      - linux
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w
        -X github.com/young1lin/port-bridge/internal/version.Version={{.Version}}
        -X github.com/young1lin/port-bridge/internal/version.BuildDate={{.Date}}
        -X github.com/young1lin/port-bridge/internal/version.GitCommit={{.ShortCommit}}
    overrides:
      - goos: windows
        env:
          - CGO_ENABLED=1
          - CC=x86_64-w64-mingw32-gcc
        ldflags:
          - -s -w -H=windowsgui
            -X github.com/young1lin/port-bridge/internal/version.Version={{.Version}}
            -X github.com/young1lin/port-bridge/internal/version.BuildDate={{.Date}}
            -X github.com/young1lin/port-bridge/internal/version.GitCommit={{.ShortCommit}}
    main: ./cmd/port-bridge

archives:
  - id: dist-archives
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

  # Raw binaries published alongside archives so the in-app updater can
  # download and apply them directly (selfupdate.Apply expects a raw binary,
  # not a compressed archive).  Name uses os-arch with a hyphen so that
  # platformSuffix() in updater.go (runtime.GOOS+"-"+runtime.GOARCH) matches.
  - id: updater-binaries
    format: binary
    name_template: "{{ .ProjectName }}_{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

release:
  github:
    owner: young1lin
    name: port-bridge
  draft: false
  prerelease: auto
